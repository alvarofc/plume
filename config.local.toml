[server]
host = "0.0.0.0"
port = 8787

[storage]
# Local filesystem — no S3/MinIO needed
uri = "./data/lancedb"

[cache]
ram_capacity_mb = 512
nvme_capacity_gb = 1
nvme_path = "/tmp/plume-cache"

[encoder]
# Local path to the downloaded ONNX model dir. The encoder loader probes
# `{model}/model.onnx` + `{model}/tokenizer.json` and silently falls back
# to MockEncoder if either is missing — a HF repo id here (e.g.
# `lightonai/LateOn-Code-edge`) would look right but would produce
# meaningless embeddings. Run `bash scripts/download-model.sh` to populate.
model = "./models/lateon-code-edge"
pool_factor = 2
batch_size = 32

[index]
nbits = 8
num_partitions = 128
nprobes = 20
ann_candidate_multiplier = 50
max_candidates = 10000
