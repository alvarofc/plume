[server]
host = "0.0.0.0"
port = 8787

[storage]
# Local filesystem — no S3/MinIO needed
uri = "./data/lancedb"

[cache]
ram_capacity_mb = 512
nvme_capacity_gb = 1
nvme_path = "/tmp/plume-cache"

[encoder]
model = "lightonai/LateOn-Code-edge"
pool_factor = 2
batch_size = 32

[index]
nbits = 8
num_partitions = 128
nprobes = 20
ann_candidate_multiplier = 50
max_candidates = 10000
