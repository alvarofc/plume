name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Least-privilege default: CI only reads the repo. Individual jobs can
# opt into more scopes if ever needed.
permissions:
  contents: read

jobs:
  test:
    name: test + clippy (linux)
    runs-on: ubuntu-22.04
    steps:
      # Third-party actions are pinned to full commit SHAs (with the tag
      # as a trailing comment) so a compromised tag push can't silently
      # swap the code we run. Bump by re-resolving the tag.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
