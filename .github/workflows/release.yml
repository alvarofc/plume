name: release

# Build prebuilt `plume` binaries on every version tag push so users never
# need to install Rust + protoc just to try it. Artifacts are attached to
# the corresponding GitHub Release; `install.sh` pulls the right one.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release as (e.g. v0.1.1). If empty, uses the triggering ref."
        required: false

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            features: onnx,storage-aws,storage-gcs
          - target: x86_64-apple-darwin
            runner: macos-13
            # Intel macOS: pyke does not publish prebuilt ort for this
            # target, so use the dynamic-loading variant and ship the
            # system libonnxruntime in the tarball.
            features: onnx-system-ort,storage-aws,storage-gcs
            system_ort: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            features: onnx,storage-aws,storage-gcs
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            features: onnx,storage-aws,storage-gcs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          echo "PROTOC=$(brew --prefix protobuf)/bin/protoc" >> "$GITHUB_ENV"

      - name: Install onnxruntime (system-ort targets)
        if: matrix.system_ort
        run: brew install onnxruntime

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p plume-api --bin plume \
            --no-default-features \
            --features ${{ matrix.features }}

      - name: Stage tarball
        id: stage
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          STAGE="plume-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.target }}/release/plume" "dist/${STAGE}/"
          cp README.md LICENSE "dist/${STAGE}/" 2>/dev/null || true
          # system-ort builds: bundle the dylib in the same directory as the
          # binary. `ort`'s default dynamic-loader path checks next to the
          # executable when `ORT_DYLIB_PATH` is unset.
          if [[ "${{ matrix.system_ort }}" == "true" ]]; then
            cp /usr/local/opt/onnxruntime/lib/libonnxruntime.dylib "dist/${STAGE}/" || true
          fi
          cd dist
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          echo "archive=dist/${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${STAGE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: plume-${{ matrix.target }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.checksum }}

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tagged push → the pushed tag; manual dispatch → the input tag.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
