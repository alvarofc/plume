[server]
host = "0.0.0.0"
port = 8787

[storage]
# Local dev with MinIO (docker compose sets AWS_ENDPOINT env var)
# Requires building plume with the `storage-aws` feature.
uri = "s3://plume/data"
region = "us-east-1"

# AWS S3:
# uri = "s3://my-bucket/plume"
# region = "us-east-1"

# Cloudflare R2:
# uri = "s3://my-bucket/plume"
# endpoint = "https://<account>.r2.cloudflarestorage.com"

# Google Cloud Storage:
# uri = "gs://my-bucket/plume"

[cache]
ram_capacity_mb = 2048
nvme_capacity_gb = 50
nvme_path = "/var/cache/plume"

[encoder]
model = "lightonai/LateOn-Code-edge"
pool_factor = 2
batch_size = 32

[index]
# IVF_PQ tuned for ColBERT native multi-vector on LanceDB 0.27+.
# Defaults match the bench-recall sweet spot on BEIR SciFact with a 48-dim
# ColBERT encoder: ~138ms at recall saturating the model's own ceiling.
nbits = 8
num_partitions = 128
nprobes = 20
# refine_factor unset: client-side MaxSim rerank already recovers exact
# ordering from the candidate pool below. Setting refine_factor adds >10×
# latency with no e2e recall gain.
ann_candidate_multiplier = 50
# Hard ceiling on ANN candidates materialized per query. Every candidate
# pulls its full multivector for MaxSim rerank, so this bounds per-query
# memory regardless of `ann_candidate_multiplier * k`.
max_candidates = 10000
